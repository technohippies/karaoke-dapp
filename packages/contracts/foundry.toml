[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200

[etherscan]
base_sepolia = { key = "${ETHERSCAN_API_KEY}" }
base = { key = "${ETHERSCAN_API_KEY}" }

[rpc_endpoints]
base_sepolia = "${RPC_URL_SEPOLIA}"
base = "${RPC_URL_BASE}"
localhost = "http://localhost:8545"